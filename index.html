<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./javascript.js" defer></script>
</head>
<body>
    <div>
        <div id="displayContainer">
            <div id="displaySecond"></div>
            <div id="display"></div>
        </div>
        
        <button id="addOperator" class="operator">+</button>
        <button id="subtractOperator" class="operator">-</button>
        <button id="divideOperator" class="operator"> &divide;</button>
        <button id="multiplyOperator" class="operator">&times;</button>
        <button id="equal">=</button>
        <button id="c">C</button>
        <button id="ce">CE</button>
        <button id="zero" class="number zero">0</button>
        <button id="one" class="number notZero">1</button>
        <button id="two" class="number notZero">2</button>
        <button id="three" class="number notZero">3</button>
        <button id="four" class="number notZero">4</button>
        <button id="five" class="number notZero">5</button>
        <button id="six" class="number notZero">6</button>
        <button id="seven" class="number notZero">7</button>
        <button id="eight" class="number notZero">8</button>
        <button id="nine" class="number notZero">9</button>
        <button id="decimalPoint" class="number notZero">.</button>
    </div>
</body>
</html>
